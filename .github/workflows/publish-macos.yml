name: Publish macOS Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional package version override, for example 1.3.0
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: publish-macos-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build macOS ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-15

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build unsigned macOS package
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          args=(--arch "${{ matrix.arch }}")
          if [[ -n "${VERSION:-}" ]]; then
            args+=(--version "$VERSION")
          fi
          bash publish/mac/publish-mac.sh "${args[@]}"

      - name: Validate app bundle
        run: |
          set -euo pipefail
          app_path="$(ls -1d publish/output/AntBrowser-*-macos-${{ matrix.arch }}.app | head -n 1)"
          zip_path="$(ls -1 publish/output/AntBrowser-*-macos-${{ matrix.arch }}.zip | head -n 1)"
          echo "Validating: $app_path"
          test -x "$app_path/Contents/MacOS/ant-chrome"
          plutil -lint "$app_path/Contents/Info.plist"
          ditto -x -k "$zip_path" /tmp/ant-browser-macos-validate
          test -x "/tmp/ant-browser-macos-validate/$(basename "$app_path")/Contents/MacOS/ant-chrome"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ant-browser-macos-${{ matrix.arch }}
          path: |
            publish/output/AntBrowser-*-macos-${{ matrix.arch }}.app
            publish/output/AntBrowser-*-macos-${{ matrix.arch }}.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          gh release view "$TAG_NAME" >/dev/null 2>&1 || gh release create "$TAG_NAME" --generate-notes
          # Release assets are the portable zips; .app directories stay as CI artifacts only.
          mapfile -t zips < <(find release-artifacts -type f -name '*.zip' | sort)
          if [[ ${#zips[@]} -eq 0 ]]; then
            echo "[ERROR] no macOS zip artifacts found to upload" >&2
            exit 1
          fi
          gh release upload "$TAG_NAME" "${zips[@]}" --clobber
