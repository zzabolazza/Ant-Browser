name: Publish macOS Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional package version override, for example 1.3.0
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: publish-macos-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build macOS ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-15

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Resolve build version
        id: version
        env:
          VERSION_OVERRIDE: ${{ inputs.version }}
        run: |
          set -euo pipefail
          version="${VERSION_OVERRIDE:-}"
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            if [[ ! "${GITHUB_REF_NAME:-}" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
              echo "[ERROR] release tag must match vX.Y.Z: ${GITHUB_REF_NAME:-<empty>}" >&2
              exit 1
            fi
            version="${BASH_REMATCH[1]}"
          elif [[ -z "$version" ]]; then
            version="$(node -p 'require("./wails.json").info.productVersion')"
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "[ERROR] version must match X.Y.Z: $version" >&2
            exit 1
          fi

          node -e 'const fs = require("fs"); const path = "wails.json"; const config = JSON.parse(fs.readFileSync(path, "utf8")); config.info.productVersion = process.argv[1]; fs.writeFileSync(path, JSON.stringify(config, null, 2) + "\n");' "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "Resolved build version: $version"

      - name: Build unsigned macOS package
        run: bash publish/mac/publish-mac.sh --arch "${{ matrix.arch }}" --version "$VERSION"

      - name: Validate app bundle
        run: |
          set -euo pipefail
          app_path="$(ls -1d publish/output/Facade-*-macos-${{ matrix.arch }}.app | head -n 1)"
          zip_path="$(ls -1 publish/output/Facade-*-macos-${{ matrix.arch }}.zip | head -n 1)"
          echo "Validating: $app_path"
          test -x "$app_path/Contents/MacOS/facade"
          plutil -lint "$app_path/Contents/Info.plist"
          test "$(plutil -extract CFBundleShortVersionString raw "$app_path/Contents/Info.plist")" = "$VERSION"
          test "$(plutil -extract CFBundleVersion raw "$app_path/Contents/Info.plist")" = "$VERSION"
          ditto -x -k "$zip_path" /tmp/facade-macos-validate
          test -x "/tmp/facade-macos-validate/$(basename "$app_path")/Contents/MacOS/facade"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: facade-${{ steps.version.outputs.version }}-macos-${{ matrix.arch }}
          path: |
            publish/output/Facade-*-macos-${{ matrix.arch }}.app
            publish/output/Facade-*-macos-${{ matrix.arch }}.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh release view "$TAG_NAME" >/dev/null 2>&1 || gh release create "$TAG_NAME" --generate-notes
          # Release assets are the portable zips; .app directories stay as CI artifacts only.
          mapfile -t zips < <(find release-artifacts -type f -name '*.zip' | sort)
          if [[ ${#zips[@]} -eq 0 ]]; then
            echo "[ERROR] no macOS zip artifacts found to upload" >&2
            exit 1
          fi
          gh release upload "$TAG_NAME" "${zips[@]}" --clobber
