name: Publish Windows Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional package version override, for example 1.3.0
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: publish-windows-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Windows ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: windows-latest
          - arch: arm64
            runner: windows-11-arm

    runs-on: ${{ matrix.runner }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Add NSIS to PATH
        run: echo "C:\\Program Files (x86)\\NSIS" >> "$GITHUB_PATH"

      - name: Resolve build version
        id: version
        env:
          VERSION_OVERRIDE: ${{ inputs.version }}
        run: |
          set -euo pipefail
          version="${VERSION_OVERRIDE:-}"
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            if [[ ! "${GITHUB_REF_NAME:-}" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
              echo "[ERROR] release tag must match vX.Y.Z: ${GITHUB_REF_NAME:-<empty>}" >&2
              exit 1
            fi
            version="${BASH_REMATCH[1]}"
          elif [[ -z "$version" ]]; then
            version="$(node -p 'require("./wails.json").info.productVersion')"
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "[ERROR] version must match X.Y.Z: $version" >&2
            exit 1
          fi

          node -e 'const fs = require("fs"); const path = "wails.json"; const config = JSON.parse(fs.readFileSync(path, "utf8")); config.info.productVersion = process.argv[1]; fs.writeFileSync(path, JSON.stringify(config, null, 2) + "\n");' "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "Resolved build version: $version"

      - name: Build Windows packages
        env:
          BROWSERSLIST_IGNORE_OLD_DATA: "1"
        run: bash publish/windows/publish-windows.sh --arch "${{ matrix.arch }}" --version "$VERSION"

      - name: Validate portable zip layout
        run: |
          set -euo pipefail
          zip_file="$(ls -1 publish/output/Facade-*-windows-${{ matrix.arch }}.zip | head -n 1)"
          validate_dir="$(mktemp -d)"
          echo "Validating: $zip_file"
          powershell -NoProfile -Command "Expand-Archive -Path '$(cygpath -w "$zip_file")' -DestinationPath '$(cygpath -w "$validate_dir")' -Force"
          test -f "$validate_dir/facade.exe"
          test -f "$validate_dir/config.yaml"
          EXE_PATH="$(cygpath -w "$validate_dir/facade.exe")" powershell -NoProfile -Command '$fileVersion = (Get-Item -LiteralPath $env:EXE_PATH).VersionInfo.FileVersion; if (-not $fileVersion.StartsWith($env:VERSION)) { throw "Expected file version $env:VERSION, got $fileVersion" }'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: facade-${{ steps.version.outputs.version }}-windows-${{ matrix.arch }}
          path: |
            publish/output/Facade-*-windows-${{ matrix.arch }}.zip
            publish/output/Facade-Setup-*-${{ matrix.arch }}.exe
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh release view "$TAG_NAME" >/dev/null 2>&1 || gh release create "$TAG_NAME" --generate-notes
          mapfile -t assets < <(find release-artifacts -type f | sort)
          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "[ERROR] no Windows artifacts found to upload" >&2
            exit 1
          fi
          gh release upload "$TAG_NAME" "${assets[@]}" --clobber
