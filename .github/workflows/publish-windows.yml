name: Publish Windows Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional package version override, for example 1.3.0
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: publish-windows-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Windows ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: windows-latest
          - arch: arm64
            runner: windows-11-arm

    runs-on: ${{ matrix.runner }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Add NSIS to PATH
        run: echo "C:\\Program Files (x86)\\NSIS" >> "$GITHUB_PATH"

      - name: Build Windows packages
        env:
          VERSION: ${{ inputs.version }}
          BROWSERSLIST_IGNORE_OLD_DATA: "1"
        run: |
          set -euo pipefail
          args=(--arch "${{ matrix.arch }}")
          if [[ -n "${VERSION:-}" ]]; then
            args+=(--version "$VERSION")
          fi
          bash publish/windows/publish-windows.sh "${args[@]}"

      - name: Validate portable zip layout
        run: |
          set -euo pipefail
          zip_file="$(ls -1 publish/output/AntBrowser-*-windows-${{ matrix.arch }}.zip | head -n 1)"
          validate_dir="$(mktemp -d)"
          echo "Validating: $zip_file"
          powershell -NoProfile -Command "Expand-Archive -Path '$(cygpath -w "$zip_file")' -DestinationPath '$(cygpath -w "$validate_dir")' -Force"
          test -f "$validate_dir/ant-chrome.exe"
          test -f "$validate_dir/config.yaml"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ant-browser-windows-${{ matrix.arch }}
          path: |
            publish/output/AntBrowser-*-windows-${{ matrix.arch }}.zip
            publish/output/AntBrowser-Setup-*-${{ matrix.arch }}.exe
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh release view "$TAG_NAME" >/dev/null 2>&1 || gh release create "$TAG_NAME" --generate-notes
          mapfile -t assets < <(find release-artifacts -type f | sort)
          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "[ERROR] no Windows artifacts found to upload" >&2
            exit 1
          fi
          gh release upload "$TAG_NAME" "${assets[@]}" --clobber
